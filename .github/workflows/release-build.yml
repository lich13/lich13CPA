name: Build Release Bundles

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional version to publish as a tag/release (for example 0.1.0 or v0.1.0). Leave empty to only build artifacts.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' && inputs.version != ''
      && format('Build and release {0}', inputs.version)
      || github.event_name == 'workflow_dispatch'
      && 'Build artifacts (manual)'
      || format('Build release bundles for {0}', github.ref_name)
  }}

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.app_version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW_VERSION="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            RAW_VERSION="${{ inputs.version }}"
          else
            RAW_VERSION="$(python3 -c "import json; print(json.load(open('package.json', 'r', encoding='utf-8'))['version'])")"
          fi

          RAW_VERSION="${RAW_VERSION//[[:space:]]/}"
          APP_VERSION="${RAW_VERSION#v}"

          if [[ -z "${APP_VERSION}" ]]; then
            echo "Failed to resolve app version." >&2
            exit 1
          fi

          echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

  build-macos:
    name: Build macOS arm64
    needs: [resolve-version]
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Sync app version
        run: node scripts/set-app-version.mjs --version "${{ needs.resolve-version.outputs.version }}"

      - name: Prepare bundled binary
        run: node scripts/prepare-tauri-bundled-binary.mjs --target aarch64-apple-darwin

      - name: Build Tauri bundle (macOS)
        shell: bash
        run: |
          set -euo pipefail

          max_attempts=2
          attempt=1

          while true; do
            echo "macOS bundle attempt ${attempt}/${max_attempts}"

            if eval "npx tauri build --bundles dmg --target aarch64-apple-darwin"; then
              break
            fi

            if [[ "${attempt}" -ge "${max_attempts}" ]]; then
              echo "macOS bundle failed after ${attempt} attempts" >&2
              exit 1
            fi

            echo "Cleaning bundle output before retry..."
            rm -rf "src-tauri/target/aarch64-apple-darwin/release/bundle"
            attempt=$((attempt + 1))
            sleep 20
          done

      - name: Postprocess macOS DMG
        run: bash scripts/postprocess-macos-dmg.sh src-tauri/target/aarch64-apple-darwin/release/bundle/dmg lich13CPA

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-dmg-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          compression-level: 0

  prepare-windows-workspace:
    name: Prepare Windows workspace
    needs: [resolve-version]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync app version
        run: node scripts/set-app-version.mjs --version "${{ needs.resolve-version.outputs.version }}"

      - name: Build renderer assets once
        run: npm run build:renderer

      - name: Pack prepared workspace
        shell: pwsh
        run: |
          $workspaceEntries = @(
            'package.json',
            'package-lock.json',
            'vite.config.ts',
            'eslint.config.js',
            'tsconfig.json',
            'tsconfig.app.json',
            'tsconfig.node.json',
            'index.html',
            'public',
            'dist',
            'node_modules',
            'scripts',
            'shared',
            'src',
            'src-tauri'
          )

          foreach ($entry in $workspaceEntries) {
            if (-not (Test-Path $entry)) {
              throw "Missing workspace entry: $entry"
            }
          }

          tar --exclude='src-tauri/target' -cf windows-prepared-workspace.tar @workspaceEntries

      - name: Upload prepared workspace
        uses: actions/upload-artifact@v6
        with:
          name: windows-prepared-workspace
          path: windows-prepared-workspace.tar
          if-no-files-found: error
          compression-level: 0

  build-windows:
    name: Build Windows ${{ matrix.label }}
    needs: [prepare-windows-workspace]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64
            target: x86_64-pc-windows-msvc
            artifact_name: windows-exe-x64
          - label: arm64
            target: aarch64-pc-windows-msvc
            artifact_name: windows-exe-arm64

    steps:
      - name: Download prepared workspace
        uses: actions/download-artifact@v8
        with:
          name: windows-prepared-workspace
          path: .

      - name: Extract prepared workspace
        shell: pwsh
        run: tar -xf windows-prepared-workspace.tar

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Prepare Windows sidecar
        run: node scripts/prepare-tauri-bundled-binary.mjs --target ${{ matrix.target }}

      - name: Build Windows bundle
        shell: bash
        run: |
          set -euo pipefail
          npx tauri build \
            --bundles nsis \
            --target "${{ matrix.target }}" \
            --config '{"build":{"beforeBuildCommand":""}}'

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          compression-level: 0

  publish-release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Normalize release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            RAW_VERSION="${{ inputs.version }}"
            RAW_VERSION="${RAW_VERSION//[[:space:]]/}"
            if [[ -z "${RAW_VERSION}" ]]; then
              echo "Manual release requires a version input." >&2
              exit 1
            fi
            if [[ "${RAW_VERSION}" == v* ]]; then
              TAG_NAME="${RAW_VERSION}"
            else
              TAG_NAME="v${RAW_VERSION}"
            fi
          fi
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t release_files < <(find release-assets -maxdepth 1 -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)

          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi

          TAG_NAME="${{ steps.tag.outputs.tag_name }}"

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            RELEASE_ID="$(gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json id -q '.id')"
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              -f target_commitish="${GITHUB_SHA}" \
              -F generate_release_notes=true >/dev/null
            gh release upload "${TAG_NAME}" "${release_files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create \
              "${TAG_NAME}" \
              "${release_files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --generate-notes
          fi
